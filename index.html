<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tic Tac Toe Game</title>

    <link rel="stylesheet" href="style.css" />
    <script src="main.js"></script>
  </head>
  <body>
    <h1>Tic Tac Toe</h1>
    <h2>Its your turn, <span class="display_player"></span>.</h2>

    <div class="game_board">
      <div class="row">
        <div class="one" data-index="0"><span class="xo"></span></div>
        <div class="two" data-index="1"><span class="xo"></span></div>
        <div class="three" data-index="2"><span class="xo"></span></div>
      </div>
      <div class="row">
        <div class="four" data-index="3"><span class="xo"></span></div>
        <div class="five" data-index="4"><span class="xo"></span></div>
        <div class="six" data-index="5"><span class="xo"></span></div>
      </div>
      <div class="row">
        <div class="seven" data-index="6"><span class="xo"></span></div>
        <div class="eight" data-index="7"><span class="xo"></span></div>
        <div class="nine" data-index="8"><span class="xo"></span></div>
      </div>
    </div>

    <button class="new_game">New Game</button>
    <button class="reset">Reset</button>
  </body>
</html>
